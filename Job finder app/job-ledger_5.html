function lsGet(key, fallback) {

    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}

// Decode HTML entities in case the API returns escaped HTML (e.g. &lt;p&gt;...).
// Some Greenhouse boards (Glossier, etc.) return content where the HTML tags
// have been entity-encoded, so doing innerHTML = html shows the literal tags.
function decodeHtmlEntities(s) {
  if (!s) return "";
  // If it contains entity-encoded tags but no real ones, decode once.
  if (/&lt;[a-z\/!]/i.test(s) && !/<[a-z\/!]/i.test(s)) {
    const ta = document.createElement("textarea");
    ta.innerHTML = s;
    return ta.value;
  }
  return s;
}

// Extract a salary range from free-text description content. Greenhouse and
// Lever both let companies write the comp band into the description; pay-
// transparency laws (NYC, CA, WA, CO) mean most US tech roles include one.
const SALARY_RX = [
  // $120,000 - $150,000   /   $120K - $150K   /   $120,000 to $150,000
  /\$\s?(\d{2,3}(?:,\d{3})?(?:\.\d+)?\s?[Kk]?)\s?(?:-|to||)\s?\$?\s?(\d{2,3}(?:,\d{3})?(?:\.\d+)?\s?[Kk]?)/,
  // 120K-150K
  /(\d{2,3}\s?[Kk])\s?(?:-|to||)\s?(\d{2,3}\s?[Kk])/,
  // hourly: $18-$20 per hour
  /\$\s?(\d{1,3}(?:\.\d+)?)\s?(?:-|to||)\s?\$?\s?(\d{1,3}(?:\.\d+)?)\s?(?:\/|per\s)?(?:hr|hour)/i,
];
function extractSalary(htmlOrText) {
  if (!htmlOrText) return null;
  const tmp = document.createElement("div");
  tmp.innerHTML = decodeHtmlEntities(htmlOrText);
  const text = (tmp.textContent || tmp.innerText || "").replace(/\s+/g, " ");
  for (const rx of SALARY_RX) {
    const m = text.match(rx);
    if (m) {
      const isHourly = /hr|hour/i.test(m[0]);
      // Convert each captured token into a number of dollars per year (or per hour for hourly).
      const toNum = (raw) => {
        const s = String(raw).replace(/\s/g, "");
        if (/k$/i.test(s)) return parseFloat(s.replace(/k/i, "").replace(/,/g, "")) * 1000;
        return parseFloat(s.replace(/,/g, ""));
      };
      const lo = toNum(m[1]);
      const hi = toNum(m[2]);
      const fmt = (n) => {
        if (isHourly) return "$" + (n % 1 === 0 ? n : n.toFixed(2));
        if (n >= 1000) return "$" + Math.round(n / 1000) + "K";
        return "$" + n + "K";
      };
      return {
        display: `${fmt(lo)}${fmt(hi)}${isHourly ? "/hr" : ""}`,
        max: hi,             // top of range, used by the salary filter
        isHourly,            // hourly roles are excluded from the salary filter
      };
    }
  }
  return null;
}

// Infer employment type from job title + Greenhouse metadata.
function inferJobType(title, metadata) {
  const t = (title || "").toLowerCase();
  if (/\bintern(ship)?\b|\bco-?op\b|\bsummer associate\b|\bsummer analyst\b/.test(t)) return "internship";
  if (/\bpart[\s-]?time\b/.test(t)) return "parttime";
  if (/\bcontract(or)?\b|\btemporary\b|\bseasonal\b|\bfreelance\b/.test(t)) return "contract";
  // Greenhouse exposes employment_type in metadata for some boards.
  if (Array.isArray(metadata)) {
    for (const m of metadata) {
      const v = String(m?.value || "").toLowerCase();
      if (/intern/.test(v)) return "internship";
      if (/part[\s-]?time/.test(v)) return "parttime";
      if (/contract|temp|seasonal/.test(v)) return "contract";
      if (/full[\s-]?time/.test(v)) return "fulltime";
    }
  }
  return "fulltime";
}

async function fetchGreenhouse(company) {
  const url = `https://boards-api.greenhouse.io/v1/boards/${company.slug}/jobs?content=true`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} (slug "${company.slug}" may be wrong)`);
  const data = await res.json();
  return (data.jobs || []).map(j => {
    const decoded = decodeHtmlEntities(j.content || "");
    return {
      id: `gh-${company.slug}-${j.id}`,
      title: j.title,
      company: company.name,
      industry: company.industry,
      location: j.location?.name || "",
      url: j.absolute_url,
      department: j.departments?.[0]?.name || "",
      contentHtml: decoded,
      salary: extractSalary(decoded),
      jobType: inferJobType(j.title, j.metadata),
      postedAt: j.updated_at || null,
      source: "Greenhouse",
    };
  });
}

async function fetchLever(company) {
  const url = `https://api.lever.co/v0/postings/${company.slug}?mode=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} (slug "${company.slug}" may be wrong)`);
  const data = await res.json();
  return (data || []).map(j => {
    const desc = (j.descriptionPlain || j.description || "").slice(0, 1200);
    return {
      id: `lv-${company.slug}-${j.id}`,
      title: j.text,
      company: company.name,
      industry: company.industry,
      location: j.categories?.location || "",
      url: j.hostedUrl,
      department: j.categories?.team || "",
      contentHtml: desc,
      salary: extractSalary(desc),
      jobType: (() => {
        const c = (j.categories?.commitment || "").toLowerCase();
        if (/intern/.test(c)) return "internship";
        if (/part/.test(c)) return "parttime";
        if (/contract|temp/.test(c)) return "contract";
        return inferJobType(j.text, null);
      })(),
      postedAt: j.createdAt ? new Date(j.createdAt).toISOString() : null,
      source: "Lever",
    };
  });
}

async function fetchCompany(company) {
  try {
    let jobs = [];
    if (company.ats === "greenhouse") jobs = await fetchGreenhouse(company);
    else if (company.ats === "lever") jobs = await fetchLever(company);
    else return { jobs: [], error: `Unsupported ATS: ${company.ats}`, is404: false };
    return { jobs, error: null, is404: false };
  } catch (e) {
    const msg = e?.message || String(e);
    const is404 = /HTTP 404/i.test(msg);
    const friendly = /failed to fetch|networkerror|load failed/i.test(msg) ? "Network/CORS error" : msg;
    return { jobs: [], error: friendly, is404 };
  }
}

function summarize(html, maxChars = 220) {
  if (!html) return "";
  const tmp = document.createElement("div");
  tmp.innerHTML = decodeHtmlEntities(html);
  const text = (tmp.textContent || tmp.innerText || "").replace(/\s+/g, " ").trim();
  const sentences = text.split(/(?<=[.!?])\s+/);
  let out = "";
  for (const s of sentences) {
    if ((out + " " + s).length > maxChars) break;
    out = out ? out + " " + s : s;
    if (out.length > maxChars * 0.6 && /[.!?]$/.test(out)) break;
  }
  return out || text.slice(0, maxChars);
}

function matchesFunction(title, fnId) {
  const kws = FUNCTION_KEYWORDS[fnId] || [];
  const t = title.toLowerCase();
  return kws.some(k => t.includes(k));
}

function matchesSeniority(title, level) {
  const t = title.toLowerCase();
  if (level === "any") return true;
  if (level === "leadership") return /\b(director|vp|vice president|head of|chief|principal|partner)\b/.test(t);
  if (level === "mid_senior") return /\b(senior|sr\.?|staff|lead|manager|mgr)\b/.test(t) && !/\b(director|vp|vice president|chief|head of|partner)\b/.test(t);
  if (level === "mid") return !/\b(intern|junior|jr\.?|entry|new grad|director|vp|chief|head of|principal|partner)\b/.test(t) && !/\b(senior|sr\.?|staff|lead|head)\b/.test(t);
  if (level === "early") {
    // Early-career titles: must contain a clearly-junior signal AND not contain a clearly-senior one.
    // Note: "manager" is allowed because "Associate Brand Manager" / "Associate Product Manager" are
    // legitimate early-career titles  we exclude only un-prefixed "manager" via the senior-block.
    const earlySignals = /\b(intern|associate|analyst|junior|jr\.?|entry[\s-]?level|new[\s-]?grad|graduate|early[\s-]?career|rotational|rotation|fellow(ship)?|trainee|apprentice|coordinator|assistant|specialist|campus|university|undergrad|apm|aam|amm|abm|residency|2026 grad|class of 2026|class of 2027)\b/;
    const seniorBlock = /\b(senior|sr\.?|staff|principal|director|vp|vice president|head of|chief|partner|lead engineer|lead designer|lead pm|tech lead)\b/;
    return earlySignals.test(t) && !seniorBlock.test(t);
  }
  return true;
}

function matchesLocation(loc, filter) {
  if (filter === "any") return true;
  const l = (loc || "").toLowerCase();
  if (filter === "remote") return /remote|anywhere/.test(l);
  if (filter === "us") {
    return (/(united states|usa|u\.s\.|, [a-z]{2}\b|new york|san francisco|seattle|boston|chicago|austin|los angeles|nyc|sf|denver|miami|atlanta|washington|philadelphia|portland|nashville|raleigh|durham|houston|dallas|fort worth|san antonio)/.test(l) || /remote/.test(l))
      && !/europe|emea|apac|london|berlin|paris|amsterdam|toronto|canada|india|tokyo|sydney|singapore|brazil|mexico|dublin/.test(l);
  }
  if (filter === "nyc") return /new york|nyc|, ny\b/.test(l);
  if (filter === "sf") return /san francisco|, sf\b|bay area|palo alto|menlo park|mountain view/.test(l);
  if (filter === "houston") return /houston/.test(l);
  if (filter === "philly") return /philadelphia|philly|, pa\b/.test(l);
  return true;
}

function encodeFiltersToHash(filters) {
  try { return btoa(encodeURIComponent(JSON.stringify(filters))); } catch (e) { return ""; }
}
function decodeFiltersFromHash(hash) {
  try {
    const cleaned = (hash || "").replace(/^#/, "");
    if (!cleaned) return null;
    return JSON.parse(decodeURIComponent(atob(cleaned)));
  } catch (e) { return null; }
}

function dedupeJobs(jobs) {
  const seen = new Map();
  for (const j of jobs) {
    const key = `${j.company}::${(j.title || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim()}::${(j.location || "").toLowerCase().slice(0, 20)}`;
    if (!seen.has(key)) seen.set(key, j);
  }
  return Array.from(seen.values());
}

function JobFinder() {
  const [companies, setCompanies] = useState(() => lsGet(STORAGE_KEYS.companies, COMPANIES_DEDUPED) || COMPANIES_DEDUPED);
  const [prunedSlugs, setPrunedSlugs] = useState(() => lsGet(STORAGE_KEYS.prunedSlugs, {}) || {});
  const [jobs, setJobs] = useState(() => lsGet(STORAGE_KEYS.jobs, []) || []);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [fetchErrors, setFetchErrors] = useState([]);
  const [lastFetch, setLastFetch] = useState(() => lsGet(STORAGE_KEYS.lastFetch, null));
  const [saved, setSaved] = useState(() => lsGet(STORAGE_KEYS.saved, {}) || {});
  const [dismissed, setDismissed] = useState(() => lsGet(STORAGE_KEYS.dismissed, {}) || {});
  const [showAddCompany, setShowAddCompany] = useState(false);
  const [showCompanyManager, setShowCompanyManager] = useState(false);
  const [copied, setCopied] = useState(false);
  const [filtersExpanded, setFiltersExpanded] = useState(true);
  const [diagnostic, setDiagnostic] = useState(null);

  const [filters, setFilters] = useState(() => {
    const urlF = decodeFiltersFromHash(window.location.hash);
    const stored = lsGet(STORAGE_KEYS.filters, null);
    return { functions: [], industries: [], jobTypes: [], seniority: "any", location: "any", minSalary: 0, requireSalary: false, keyword: "", showSavedOnly: false, ...(stored || {}), ...(urlF || {}) };
  });

  useEffect(() => { lsSet(STORAGE_KEYS.filters, filters); }, [filters]);

  const runDiagnostic = useCallback(async () => {
    setDiagnostic({ ok: null, msg: "Testing Anthropic Greenhouse board" });
    const result = await fetchCompany({ name: "Anthropic", ats: "greenhouse", slug: "anthropic", industry: "ai" });
    if (result.error) {
      setDiagnostic({ ok: false, msg: `Test failed: ${result.error}.` });
    } else {
      setDiagnostic({ ok: true, msg: `Test succeeded: pulled ${result.jobs.length} jobs from Anthropic. Click Refresh to fetch all companies.` });
    }
  }, []);

  const refreshJobs = useCallback(async () => {
    setLoading(true);
    // Skip slugs already pruned (returned 404 on a previous run).
    const liveCompanies = companies.filter(c => !prunedSlugs[`${c.ats}:${c.slug}`]);
    setProgress({ done: 0, total: liveCompanies.length });
    setFetchErrors([]);
    const all = [];
    const errors = [];
    const newPruned = { ...prunedSlugs };
    let prunedThisRun = 0;
    const batchSize = 8;
    for (let i = 0; i < liveCompanies.length; i += batchSize) {
      const batch = liveCompanies.slice(i, i + batchSize);
      const results = await Promise.all(batch.map(fetchCompany));
      results.forEach((r, idx) => {
        if (r.error) {
          errors.push({ name: batch[idx].name, reason: r.error });
          // Auto-prune: 404 means the slug is wrong / company moved off Greenhouse-Lever.
          // Don't prune transient network errors.
          if (r.is404) {
            newPruned[`${batch[idx].ats}:${batch[idx].slug}`] = { name: batch[idx].name, prunedAt: new Date().toISOString() };
            prunedThisRun++;
          }
        } else {
          all.push(...r.jobs);
        }
      });
      setProgress({ done: Math.min(i + batchSize, liveCompanies.length), total: liveCompanies.length });
      setFetchErrors([...errors]);
    }
    if (prunedThisRun > 0) {
      setPrunedSlugs(newPruned);
      lsSet(STORAGE_KEYS.prunedSlugs, newPruned);
    }
    const deduped = dedupeJobs(all);
    setJobs(deduped);
    const ts = new Date().toISOString();
    setLastFetch(ts);
    lsSet(STORAGE_KEYS.jobs, deduped);
    lsSet(STORAGE_KEYS.lastFetch, ts);
    setLoading(false);
  }, [companies, prunedSlugs]);

  const visibleJobs = useMemo(() => {
    const kw = filters.keyword.toLowerCase().trim();
    return jobs
      .filter(j => !dismissed[j.id])
      .filter(j => {
        if (filters.showSavedOnly && !saved[j.id]) return false;
        if (filters.functions.length > 0 && !filters.functions.some(fn => matchesFunction(j.title, fn))) return false;
        if (filters.industries.length > 0 && !filters.industries.includes(j.industry)) return false;
        if (filters.jobTypes && filters.jobTypes.length > 0 && !filters.jobTypes.includes(j.jobType || "fulltime")) return false;
        if (!matchesSeniority(j.title, filters.seniority)) return false;
        if (!matchesLocation(j.location, filters.location)) return false;
        // Require-salary toggle: when on, hide any role that doesn't disclose a salary.
        // Hourly roles count as disclosed (they have a band), so they're kept.
        if (filters.requireSalary && !j.salary) return false;
        // Min-salary filter: only applied when user picks a non-zero minimum.
        // Hourly roles are excluded from this comparison since you can't compare $25/hr to $150K.
        if (filters.minSalary > 0) {
          if (!j.salary) {
            // Already handled by requireSalary above. If requireSalary is off, we keep
            // un-disclosed roles in results so the feed doesn't silently shrink by half.
          } else if (j.salary.isHourly) {
            // pass  hourly roles can't be compared to an annual minimum
          } else if (j.salary.max < filters.minSalary) {
            return false;
          }
        }
        if (kw) {
          const blob = `${j.title} ${j.company} ${j.location} ${j.department}`.toLowerCase();
          if (!blob.includes(kw)) return false;
        }
        return true;
      })
      .sort((a, b) => {
        if (saved[a.id] && !saved[b.id]) return -1;
        if (!saved[a.id] && saved[b.id]) return 1;
        const da = a.postedAt ? new Date(a.postedAt).getTime() : 0;
        const db = b.postedAt ? new Date(b.postedAt).getTime() : 0;
        return db - da;
      });
  }, [jobs, filters, dismissed, saved]);

  const toggleSave = (job) => {
    const next = { ...saved };
    if (next[job.id]) delete next[job.id];
    else next[job.id] = { savedAt: new Date().toISOString(), title: job.title, company: job.company, url: job.url };
    setSaved(next);
    lsSet(STORAGE_KEYS.saved, next);
  };

  const dismissJob = (job) => {
    const next = { ...dismissed, [job.id]: true };
    setDismissed(next);
    lsSet(STORAGE_KEYS.dismissed, next);
  };

  const toggleFunction = (id) => setFilters(f => ({ ...f, functions: f.functions.includes(id) ? f.functions.filter(x => x !== id) : [...f.functions, id] }));
  const toggleIndustry = (id) => setFilters(f => ({ ...f, industries: f.industries.includes(id) ? f.industries.filter(x => x !== id) : [...f.industries, id] }));
  const toggleJobType = (id) => setFilters(f => ({ ...f, jobTypes: (f.jobTypes || []).includes(id) ? (f.jobTypes || []).filter(x => x !== id) : [...(f.jobTypes || []), id] }));
  const clearFilters = () => setFilters({ functions: [], industries: [], jobTypes: [], seniority: "any", location: "any", minSalary: 0, requireSalary: false, keyword: "", showSavedOnly: false });

  const copyShareLink = async () => {
    const hash = encodeFiltersToHash(filters);
    const url = `${window.location.origin}${window.location.pathname}#${hash}`;
    try {
      await navigator.clipboard.writeText(url);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    }
  };

  const copyJobLinks = async () => {
    const text = visibleJobs.slice(0, 50).map(j => `${j.title}  ${j.company} (${j.location})\n${j.url}\n${summarize(j.contentHtml, 180)}\n`).join("\n");
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (e) {}
  };

  const lastFetchLabel = useMemo(() => {
    if (!lastFetch) return "Never";
    const d = new Date(lastFetch);
    const diffMs = Date.now() - d.getTime();
    const diffMin = Math.round(diffMs / 60000);
    if (diffMin < 1) return "Just now";
    if (diffMin < 60) return `${diffMin}m ago`;
    const diffHr = Math.round(diffMin / 60);
    if (diffHr < 24) return `${diffHr}h ago`;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }, [lastFetch]);

  const savedCount = Object.keys(saved).length;
  const activeFilterCount = filters.functions.length + filters.industries.length + (filters.jobTypes?.length || 0) + (filters.seniority !== "any" ? 1 : 0) + (filters.location !== "any" ? 1 : 0) + ((filters.minSalary || 0) > 0 ? 1 : 0) + (filters.requireSalary ? 1 : 0) + (filters.keyword ? 1 : 0) + (filters.showSavedOnly ? 1 : 0);

  return (
    <div className="min-h-screen w-full">
      <header className="border-b" style={{ borderColor: "#1a1a1a", background: "#1a1a1a", color: "#f5f1ea" }}>
        <div className="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-3xl md:text-4xl font-medium mt-1" style={{ letterSpacing: "-0.02em" }}>AI Job Finder</h1>
          </div>
          <div className="mono flex items-center gap-2 text-xs">
            <Clock size={12} className="opacity-60" />
            <span className="opacity-60">Last refresh:</span>
            <span>{lastFetchLabel}</span>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8">
        <section className="mb-6">
          <div className="flex flex-wrap items-center gap-2 mb-5">
            <button onClick={refreshJobs} disabled={loading} className="mono inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium" style={{ background: "#1a1a1a", color: "#f5f1ea", letterSpacing: "0.02em", opacity: loading ? 0.7 : 1 }}>
              <RefreshCw size={14} className={loading ? "spin" : ""} />
              {loading ? `${progress.done}/${progress.total} companies` : "Refresh jobs"}
            </button>
            <button onClick={copyShareLink} className="mono inline-flex items-center gap-2 px-4 py-2.5 text-sm border" style={{ borderColor: "#1a1a1a" }}>
              {copied ? <Check size={14} /> : <Share2 size={14} />}
              {copied ? "Copied" : "Share filters"}
            </button>
            <button onClick={copyJobLinks} disabled={visibleJobs.length === 0} className="mono inline-flex items-center gap-2 px-4 py-2.5 text-sm border" style={{ borderColor: "#1a1a1a", opacity: visibleJobs.length === 0 ? 0.4 : 1 }}>
              <Copy size={14} /> Copy {Math.min(visibleJobs.length, 50)} results
            </button>
          </div>

          {diagnostic && (
            <div className="mb-4 px-4 py-3 border flex items-start gap-3 text-sm" style={{
              borderColor: diagnostic.ok === false ? "#a33" : diagnostic.ok === true ? "#1a1a1a" : "#1a1a1a40",
              background: diagnostic.ok === false ? "#fdecec" : diagnostic.ok === true ? "#e8f3e0" : "#fffdf8"
            }}>
              {diagnostic.ok === false ? <AlertTriangle size={16} className="mt-0.5 shrink-0" style={{ color: "#a33" }} /> : <Check size={16} className="mt-0.5 shrink-0" />}
              <span className="mono" style={{ fontSize: "13px" }}>{diagnostic.msg}</span>
              <button onClick={() => setDiagnostic(null)} className="ml-auto opacity-50 hover:opacity-100"><X size={14} /></button>
            </div>
          )}

          {fetchErrors.length > 0 && !loading && (() => {
            const networkErrors = fetchErrors.filter(e => !/HTTP 404/i.test(e.reason));
            const fourOhFours = fetchErrors.filter(e => /HTTP 404/i.test(e.reason));
            // Hide entirely if every error was a 404 (those got auto-pruned silently).
            if (networkErrors.length === 0 && fourOhFours.length === 0) return null;
            return (
              <div className="mb-4 px-4 py-3 border text-sm" style={{ borderColor: networkErrors.length > 0 ? "#a33" : "#1a1a1a40", background: networkErrors.length > 0 ? "#fdecec" : "#fffdf8" }}>
                <div className="flex items-center gap-2 mb-1">
                  <AlertTriangle size={14} style={{ color: networkErrors.length > 0 ? "#a33" : "#1a1a1a80" }} />
                  <span className="mono font-medium">
                    {networkErrors.length > 0 && <>{networkErrors.length} network error{networkErrors.length === 1 ? "" : "s"}</>}
                    {networkErrors.length > 0 && fourOhFours.length > 0 && " ñ "}
                    {fourOhFours.length > 0 && <>{fourOhFours.length} slug{fourOhFours.length === 1 ? "" : "s"} auto-pruned (404)</>}
                  </span>
                </div>
                {fourOhFours.length > 0 && (
                  <p className="mono text-xs opacity-60 mb-1">Pruned slugs are skipped on future refreshes. Restore them in the Companies panel.</p>
                )}
                {networkErrors.length > 0 && (
                  <details>
                    <summary className="mono text-xs opacity-70">? see which companies</summary>
                    <div className="mono mt-2 text-xs opacity-70 max-h-32 overflow-y-auto">
                      {networkErrors.map((e, i) => <div key={i}>{e.name}: {e.reason}</div>)}
                    </div>
                  </details>
                )}
              </div>
            );
          })()}

          {loading && progress.total > 0 && (
            <div className="mb-4 h-1 w-full" style={{ background: "#1a1a1a20" }}>
              <div className="h-full transition-all" style={{ background: "#1a1a1a", width: `${(progress.done / progress.total) * 100}%` }}></div>
            </div>
          )}

          <div className="border" style={{ borderColor: "#1a1a1a", background: "#fffdf8" }}>
            <button onClick={() => setFiltersExpanded(v => !v)} className="w-full px-5 py-3 flex items-center justify-between text-left" style={{ borderBottom: filtersExpanded ? "1px solid #1a1a1a30" : "none" }}>
              <div className="mono text-xs uppercase tracking-[0.2em] opacity-70 flex items-center gap-2">
                <Filter size={11} /> Steer the results
                {activeFilterCount > 0 && (<span className="px-1.5 py-0.5 text-[10px]" style={{ background: "#1a1a1a", color: "#f5f1ea" }}>{activeFilterCount} active</span>)}
              </div>
              <div className="flex items-center gap-3">
                {activeFilterCount > 0 && (
                  <span onClick={(e) => { e.stopPropagation(); clearFilters(); }} className="mono text-xs underline opacity-60 hover:opacity-100 cursor-pointer">clear all</span>
                )}
                {filtersExpanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
              </div>
            </button>

            {filtersExpanded && (
              <div className="p-5 space-y-5">
                <div>
                  <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">
                    Job function {filters.functions.length > 0 && <span className="opacity-100">ñ {filters.functions.length} selected</span>}
                  </label>
                  <div className="flex flex-wrap gap-1.5">
                    {FUNCTIONS.map(t => (
                      <button key={t.id} onClick={() => toggleFunction(t.id)} className="mono px-2.5 py-1 text-xs border" style={{
                        borderColor: "#1a1a1a",
                        background: filters.functions.includes(t.id) ? "#1a1a1a" : "transparent",
                        color: filters.functions.includes(t.id) ? "#f5f1ea" : "#1a1a1a",
                      }}>{t.label}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">
                    Industry {filters.industries.length > 0 && <span className="opacity-100">ñ {filters.industries.length} selected</span>}
                  </label>
                  <div className="flex flex-wrap gap-1.5">
                    {INDUSTRIES.map(t => (
                      <button key={t.id} onClick={() => toggleIndustry(t.id)} className="mono px-2.5 py-1 text-xs border" style={{
                        borderColor: "#1a1a1a",
                        background: filters.industries.includes(t.id) ? "#1a1a1a" : "transparent",
                        color: filters.industries.includes(t.id) ? "#f5f1ea" : "#1a1a1a",
                      }}>{t.label}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">
                    Job type {(filters.jobTypes?.length || 0) > 0 && <span className="opacity-100">ñ {filters.jobTypes.length} selected</span>}
                  </label>
                  <div className="flex flex-wrap gap-1.5">
                    {JOB_TYPES.map(t => (
                      <button key={t.id} onClick={() => toggleJobType(t.id)} className="mono px-2.5 py-1 text-xs border" style={{
                        borderColor: "#1a1a1a",
                        background: (filters.jobTypes || []).includes(t.id) ? "#1a1a1a" : "transparent",
                        color: (filters.jobTypes || []).includes(t.id) ? "#f5f1ea" : "#1a1a1a",
                      }}>{t.label}</button>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <div>
                    <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">Seniority</label>
                    <select value={filters.seniority} onChange={e => setFilters(f => ({ ...f, seniority: e.target.value }))} className="mono w-full px-3 py-2 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }}>
                      <option value="any">Any level</option>
                      <option value="early">Early career (Analyst / Associate, 03 yrs)</option>
                      <option value="mid">Mid (36 yrs)</option>
                      <option value="mid_senior">Senior IC / Manager (post-MBA typical)</option>
                      <option value="leadership">Director+ / Leadership</option>
                    </select>
                  </div>
                  <div>
                    <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">Location</label>
                    <select value={filters.location} onChange={e => setFilters(f => ({ ...f, location: e.target.value }))} className="mono w-full px-3 py-2 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }}>
                      <option value="any">Anywhere</option>
                      <option value="us">United States</option>
                      <option value="nyc">NYC</option>
                      <option value="sf">SF / Bay Area</option>
                      <option value="houston">Houston</option>
                      <option value="philly">Philadelphia</option>
                      <option value="remote">Remote only</option>
                    </select>
                  </div>
                  <div>
                    <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">Min. salary (top of range)</label>
                    <select value={filters.minSalary || 0} onChange={e => setFilters(f => ({ ...f, minSalary: parseInt(e.target.value, 10) }))} className="mono w-full px-3 py-2 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }}>
                      <option value="0">Any</option>
                      <option value="60000">$60K+</option>
                      <option value="80000">$80K+</option>
                      <option value="100000">$100K+</option>
                      <option value="125000">$125K+</option>
                      <option value="150000">$150K+</option>
                      <option value="175000">$175K+</option>
                      <option value="200000">$200K+</option>
                      <option value="250000">$250K+</option>
                      <option value="300000">$300K+</option>
                    </select>
                    <label className="mono inline-flex items-center gap-2 cursor-pointer text-xs mt-2 opacity-80">
                      <input type="checkbox" checked={!!filters.requireSalary} onChange={e => setFilters(f => ({ ...f, requireSalary: e.target.checked }))} className="w-3.5 h-3.5" />
                      Require disclosed salary
                    </label>
                  </div>
                  <div>
                    <label className="mono text-xs uppercase tracking-wider opacity-60 block mb-2">Keyword</label>
                    <div className="relative">
                      <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 opacity-50" />
                      <input type="text" value={filters.keyword} onChange={e => setFilters(f => ({ ...f, keyword: e.target.value }))} placeholder="e.g. fintech, growth, brand" className="mono w-full pl-9 pr-3 py-2 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }} />
                    </div>
                  </div>
                </div>

                {(filters.minSalary > 0 || filters.requireSalary) && (
                  <p className="mono text-xs opacity-60 -mt-2">
                    {filters.requireSalary
                      ? <>Showing only roles with a disclosed salary band.{filters.minSalary > 0 && <> Minimum top-of-band: ${(filters.minSalary / 1000).toFixed(0)}K.</>}</>
                      : <>Roles whose disclosed top-of-band is at least ${(filters.minSalary / 1000).toFixed(0)}K. Roles without a disclosed salary still appear  toggle <em>Require disclosed salary</em> to hide them.</>
                    }
                  </p>
                )}

                <label className="mono inline-flex items-center gap-2 cursor-pointer text-sm">
                  <input type="checkbox" checked={filters.showSavedOnly} onChange={e => setFilters(f => ({ ...f, showSavedOnly: e.target.checked }))} className="w-4 h-4" />
                  Show saved only ({savedCount})
                </label>
              </div>
            )}
          </div>
        </section>

        <section>
          <div className="flex items-baseline justify-between mb-5">
            <h2 className="text-2xl font-medium" style={{ letterSpacing: "-0.01em" }}>
              {visibleJobs.length.toLocaleString()} {visibleJobs.length === 1 ? "opening" : "openings"}
            </h2>
            {jobs.length > 0 && (
              <div className="mono text-xs opacity-60">{jobs.length.toLocaleString()} total ñ {Object.keys(dismissed).length} dismissed</div>
            )}
          </div>

          {jobs.length === 0 && !loading && (
            <div className="border-2 border-dashed p-12 text-center" style={{ borderColor: "#1a1a1a40" }}>
              <p className="text-lg mb-2">Welcome.</p>
              <p className="opacity-70 mb-1 max-w-md mx-auto">Click <strong>Refresh jobs</strong> to pull live listings from {companies.length} companies.</p>
              <p className="opacity-50 text-sm mt-2 max-w-md mx-auto">Expect 3090 seconds. Slugs that 404 are auto-pruned, so the second refresh is faster.</p>
            </div>
          )}

          <div className="space-y-3">
            {visibleJobs.slice(0, 200).map(job => (
              <JobCard key={job.id} job={job} isSaved={!!saved[job.id]} onSave={() => toggleSave(job)} onDismiss={() => dismissJob(job)} />
            ))}
            {visibleJobs.length > 200 && (
              <div className="mono text-center py-6 text-sm opacity-60">Showing 200 of {visibleJobs.length.toLocaleString()}. Add filters to narrow down.</div>
            )}
          </div>
        </section>

        <footer className="mono mt-16 pt-8 border-t text-xs opacity-50" style={{ borderColor: "#1a1a1a40" }}>
          <p>Sources: Greenhouse and Lever public job-board APIs. Apply links route directly to each company's posting.</p>
          <p className="mt-1">Saved jobs and filters persist in this browser via localStorage. The Share-link button copies a URL with your filters baked in.</p>
        </footer>
      </main>
    </div>
  );
}

function JobCard({ job, isSaved, onSave, onDismiss }) {
  const [expanded, setExpanded] = useState(false);
  const summary = useMemo(() => summarize(job.contentHtml, 200), [job.contentHtml]);
  const fullSummary = useMemo(() => summarize(job.contentHtml, 600), [job.contentHtml]);
  const industryLabel = useMemo(() => INDUSTRIES.find(i => i.id === job.industry)?.label || job.industry, [job.industry]);
  const postedLabel = useMemo(() => {
    if (!job.postedAt) return null;
    const d = new Date(job.postedAt);
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days < 1) return "Today";
    if (days === 1) return "1d";
    if (days < 30) return `${days}d`;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }, [job.postedAt]);

  return (
    <article className="border p-5" style={{ borderColor: "#1a1a1a", background: isSaved ? "#fff5d6" : "#fffdf8" }}>
      <div className="flex items-start gap-4">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-3 flex-wrap mb-1">
            <h3 className="text-lg font-medium leading-tight" style={{ letterSpacing: "-0.01em" }}>{job.title}</h3>
            {postedLabel && (<span className="mono text-xs opacity-50">{postedLabel}</span>)}
          </div>
          <div className="mono flex items-center gap-3 text-sm opacity-70 mb-3 flex-wrap">
            <span className="flex items-center gap-1"><Building2 size={11} /> {job.company}</span>
            <span className="flex items-center gap-1"><MapPin size={11} /> {job.location}</span>
            {job.department && <span className="opacity-70">ñ {job.department}</span>}
            <span className="px-1.5 py-0.5 text-[10px] uppercase tracking-wider" style={{ background: "#1a1a1a15", color: "#1a1a1a" }}>{industryLabel}</span>
            {job.jobType && job.jobType !== "fulltime" && (
              <span className="px-1.5 py-0.5 text-[10px] uppercase tracking-wider" style={{ background: "#1a1a1a", color: "#f5f1ea" }}>
                {job.jobType === "parttime" ? "Part-time" : job.jobType === "internship" ? "Internship" : job.jobType === "contract" ? "Contract" : job.jobType}
              </span>
            )}
            {job.salary && (
              <span className="px-1.5 py-0.5 text-[10px] uppercase tracking-wider font-medium" style={{ background: "#1f4a1f", color: "#f5f1ea" }}>{job.salary.display}</span>
            )}
          </div>
          {summary && (
            <p className="text-sm leading-relaxed opacity-80">
              {expanded ? fullSummary : summary}
              {fullSummary.length > summary.length && (
                <button onClick={() => setExpanded(v => !v)} className="mono ml-2 underline opacity-60 hover:opacity-100 text-xs">{expanded ? "less" : "more"}</button>
              )}
            </p>
          )}
        </div>
        <div className="flex flex-col items-end gap-2 shrink-0">
          <button onClick={onSave} title={isSaved ? "Unsave" : "Save"} className="p-2" style={{ color: isSaved ? "#1a1a1a" : "#1a1a1a80" }}>
            <Bookmark size={16} fill={isSaved ? "#1a1a1a" : "none"} />
          </button>
          <button onClick={onDismiss} title="Dismiss" className="p-2 opacity-50"><X size={16} /></button>
        </div>
      </div>
      <div className="mt-4 flex items-center justify-between">
        <span className="mono text-xs opacity-50">via {job.source}</span>
        <a href={job.url} target="_blank" rel="noopener noreferrer" className="mono inline-flex items-center gap-1.5 text-sm font-medium underline underline-offset-4">
          Apply <ExternalLink size={12} />
        </a>
      </div>
    </article>
  );
}

function AddCompanyForm({ onAdd }) {
  const [name, setName] = useState("");
  const [ats, setAts] = useState("greenhouse");
  const [slug, setSlug] = useState("");
  const [industry, setIndustry] = useState("tech");

  const submit = () => {
    if (!name.trim() || !slug.trim()) return;
    onAdd({ name: name.trim(), ats, slug: slug.trim().toLowerCase(), industry });
    setName(""); setSlug("");
  };

  return (
    <div className="border p-3 grid grid-cols-1 md:grid-cols-5 gap-2 items-end" style={{ borderColor: "#1a1a1a40", background: "#f5f1ea" }}>
      <div>
        <label className="mono text-xs opacity-60 block mb-1">Company</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Anthropic" className="w-full px-2 py-1.5 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }} />
      </div>
      <div>
        <label className="mono text-xs opacity-60 block mb-1">ATS</label>
        <select value={ats} onChange={e => setAts(e.target.value)} className="w-full px-2 py-1.5 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }}>
          <option value="greenhouse">Greenhouse</option>
          <option value="lever">Lever</option>
        </select>
      </div>
      <div>
        <label className="mono text-xs opacity-60 block mb-1">Slug</label>
        <input value={slug} onChange={e => setSlug(e.target.value)} placeholder="e.g. anthropic" className="w-full px-2 py-1.5 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }} />
      </div>
      <div>
        <label className="mono text-xs opacity-60 block mb-1">Industry</label>
        <select value={industry} onChange={e => setIndustry(e.target.value)} className="w-full px-2 py-1.5 text-sm border bg-transparent" style={{ borderColor: "#1a1a1a" }}>
          {INDUSTRIES.map(i => <option key={i.id} value={i.id}>{i.label}</option>)}
        </select>
      </div>
      <button onClick={submit} className="mono px-3 py-1.5 text-sm" style={{ background: "#1a1a1a", color: "#f5f1ea" }}>Add</button>
      <p className="md:col-span-5 text-xs opacity-60 mt-1">
        Find the slug in the board URL: <code>boards.greenhouse.io/<b>SLUG</b></code> ñ <code>jobs.lever.co/<b>SLUG</b></code>
      </p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<JobFinder />);
</script>
</body>
</html>
